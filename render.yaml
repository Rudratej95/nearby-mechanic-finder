services:
  # Backend Web Service
  - type: web
    name: nearby-mechanic-finder-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend Static Site
  - type: static
    name: nearby-mechanic-finder-ui
    runtime: static
    plan: free
    # No rootDir here because frontend is now in the root
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nearby-mechanic-finder-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
